name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check api/

      - name: Test (pytest)
        run: |
          pip install fastapi "psycopg[binary]" pytest httpx
          cd api && python -m pytest -q

      - name: Build Docker image
        run: docker build -t concierge-api ./api