# Concierge stack: database (Postgres + pgvector) + API (FastAPI + LLM)
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: concierge-db
    environment:
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge
      POSTGRES_DB: concierge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: concierge-api
    env_file:
      - .env                            # loads GROQ_API_KEY / GROQ_MODEL (gitignored)
    environment:
      DATABASE_URL: postgresql://concierge:concierge@db:5432/concierge
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: